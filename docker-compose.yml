services:
  webapp:
    build: 
      dockerfile: webapp.dockerfile 
      context: webapp
    container_name: webapp
    ports:
      - "3000"

    volumes:
      - webgate-data:/app/data
    networks:
      - webgate-network
    restart: unless-stopped
  webgate-api: 
    build : 
      dockerfile : webgate_api.dockerfile
      context: webgate-api
    ports: 
        - "8000:8000"
    environment:
      - PORT=8000
      - APP_BASE_URL=http://localhost:8000
    restart: unless-stopped

    volumes: 
      - ./webgate-api:/app
    networks:
      - webgate-network
  dashboard:
    build:
      dockerfile: dashboard.dockerfile
      context: dashboard
    container_name: webgate-dashboard
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=/api
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    networks:
      - webgate-network
    depends_on:
      - webgate-api
    restart: unless-stopped
volumes:
  webgate-data:
networks:
  webgate-network:
    driver: bridge
